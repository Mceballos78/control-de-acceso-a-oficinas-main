<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solicitud de Cita — Nexus Guard</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="login-page" style="align-items:flex-start; padding:40px 20px">

  <!-- FORMULARIO -->
  <div id="pantalla-formulario" style="background:white; border-radius:20px;
    padding:36px; width:100%; max-width:480px; margin:auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.1)">

    <a href="login.html" style="display:inline-flex; align-items:center; gap:6px;
      color:#888; font-size:0.85rem; text-decoration:none; margin-bottom:20px">
      ← Regresar al Login
    </a><h2 style="text-align:center; margin-bottom:24px; font-size:1.3rem">
      Solicitud de Cita
    </h2>

    <div class="form-group" style="margin-bottom:16px">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo"/>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Empresa</label>
      <input type="text" id="empresa" placeholder="Nombre de tu empresa"/>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Correo</label>
      <input type="email" id="correo" placeholder="tu@correo.com"/>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Empleado a visitar</label>
      <select id="empleado">
        <option value="">Selecciona al empleado</option>
        <option>Jesus Ramón Camarillo Núñez</option>
        <option>Marco Gerardo Ceballos Valdez</option>
        <option>Jesus Enrique Felix Olea</option>
        <option>Claudia Guadalupe Romero</option>
        <option>Ignacio Sanz Hernandez</option>
        <option>José Luis Toscano Sosa</option>
      </select>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px">
      <div class="form-group">
        <label>Fecha de la Cita</label>
        <input type="date" id="fecha"/>
      </div>
      <div class="form-group">
        <label>Hora</label>
        <input type="time" id="hora"/>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label>Motivo de visita</label>
      <textarea id="motivo" rows="3" placeholder="Motivo de visita"></textarea>
    </div>

    <p id="form-error"
      style="color:#E74C3C; font-size:0.82rem; margin-bottom:12px; display:none">
      Por favor llena todos los campos
    </p>

    <button class="login-btn" id="btn-solicitar">Solicitar Cita</button>

    <p style="text-align:center; margin-top:16px; font-size:0.82rem; color:#888">
      ¿Ya tienes cuenta? <a href="login.html"
        style="color:#00C48C; font-weight:700; text-decoration:none">
        Inicia sesión
      </a>
    </p>
  </div>

  <!-- PANTALLA DE CONFIRMACIÓN -->
  <div id="pantalla-confirmacion" style="display:none; background:white;
    border-radius:20px; padding:36px; width:100%; max-width:480px; margin:auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.1); text-align:center">

    <div class="confirm-card">
      <div class="check-icon">✅</div>
      <h2>Cita Solicitada</h2>
      <p>Tu Folio es: <span class="folio" id="folio-generado"></span></p>
      <p>Espera la confirmación del empleado en tu correo.</p>
    </div>

    <button class="login-btn" style="margin-top:24px"
      onclick="otraCita()">
      ¿Desea agregar otra Cita?
    </button>
  </div>

  <script>
    document.getElementById('btn-solicitar').addEventListener('click', async () => {
      const nombre   = document.getElementById('nombre').value.trim();
      const empresa  = document.getElementById('empresa').value.trim();
      const correo   = document.getElementById('correo').value.trim();
      const empleado = document.getElementById('empleado').value;
      const fecha    = document.getElementById('fecha').value;
      const hora     = document.getElementById('hora').value;
      const motivo   = document.getElementById('motivo').value.trim();
      const errorEl  = document.getElementById('form-error');

      errorEl.style.display = 'none';

      if (!nombre || !empresa || !correo || !empleado || !fecha || !hora || !motivo) {
        errorEl.style.display = 'block';
        return;
      }

      // Generar folio aleatorio
      const folio = 'SGC-' + Math.floor(1000 + Math.random() * 9000);

      try {
        await fetch('http://localhost:3000/api/accesos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
          visitante: nombre, empresa, correo,
          empleadoVisitar: empleado, fecha, hora,
          motivo, estado: 'Pendiente', folio
        })
        });
      } catch (e) {
        // Si el backend no está listo igual mostramos confirmación
      }

      document.getElementById('folio-generado').textContent = folio;
      document.getElementById('pantalla-formulario').style.display   = 'none';
      document.getElementById('pantalla-confirmacion').style.display = 'block';
    });

    function otraCita() {
      document.getElementById('pantalla-formulario').style.display   = 'block';
      document.getElementById('pantalla-confirmacion').style.display = 'none';
      ['nombre','empresa','correo','fecha','hora','motivo'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('empleado').value = '';
    }
  </script>

</body>
</html>
