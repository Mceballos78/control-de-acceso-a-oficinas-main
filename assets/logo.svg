<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Nexus Guard Logo</title>
  <desc>Logo del sistema Nexus Guard con escudo hexagonal y texto</desc>

  <defs>
    <clipPath id="hexClip">
      <polygon points="340,60 400,93 400,160 340,193 280,160 280,93" />
    </clipPath>
  </defs>

  <polygon points="340,65 397,97 397,162 340,194 283,162 283,97"
    fill="#1a2a3a" opacity="0.18" transform="translate(4,4)"/>

  <polygon points="340,60 400,93 400,160 340,193 280,160 280,93"
    fill="#2C3E50" stroke="#3498DB" stroke-width="2.5"/>

  <polygon points="340,78 384,102 384,150 340,174 296,150 296,102"
    fill="none" stroke="#3498DB" stroke-width="1.2" opacity="0.5"/>

  <line x1="296" y1="126" x2="384" y2="126" stroke="#3498DB" stroke-width="0.8" opacity="0.4"/>

  <text x="340" y="148" text-anchor="middle"
    font-family="Segoe UI, sans-serif" font-size="52" font-weight="700"
    fill="#3498DB" letter-spacing="-2">N</text>

  <polygon points="340,60 400,93 400,105 340,72 280,105 280,93"
    fill="#FFFFFF" opacity="0.07"/>

  <text x="340" y="232" text-anchor="middle"
    font-family="Segoe UI, sans-serif" font-size="28" font-weight="700"
    fill="#2C3E50" letter-spacing="6">NEXUS</text>

  <text x="340" y="260" text-anchor="middle"
    font-family="Segoe UI, sans-serif" font-size="14" font-weight="400"
    fill="#3498DB" letter-spacing="10">GUARD</text>

  <line x1="185" y1="233" x2="285" y2="233" stroke="#3498DB" stroke-width="1" opacity="0.5"/>
  <line x1="395" y1="233" x2="495" y2="233" stroke="#3498DB" stroke-width="1" opacity="0.5"/>

  <circle cx="185" cy="233" r="3" fill="#3498DB" opacity="0.6"/>
  <circle cx="495" cy="233" r="3" fill="#3498DB" opacity="0.6"/>
</svg>
