<!DOCTYPE html>
<html>
<head><title>Panel Vigilante</title></head>
<body>
  <h2>Consultar Citas</h2>
  <button onclick="verCitas()">Ver Todas</button>
  <pre id="citas"></pre>

  <h2>Registrar Entrada/Salida</h2>
  <input type="text" id="folio" placeholder="Folio" required>
  <button onclick="entrada()">Entrada</button>
  <button onclick="salida()">Salida</button>

<script>
const token = localStorage.getItem('token');

async function verCitas() {
  const res = await fetch('http://localhost:3000/api/citas', {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  document.getElementById('citas').textContent = JSON.stringify(await res.json(), null, 2);
}

async function entrada() {
  const res = await fetch(`http://localhost:3000/api/citas/${folio.value}/entrada`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  alert(await res.text());
}

async function salida() {
  const res = await fetch(`http://localhost:3000/api/citas/${folio.value}/salida`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  alert(await res.text());
}
</script>
</body>
</html>
