<!DOCTYPE html>
<html>
<head><title>Panel Proveedor</title></head>
<body>
  <h2>Mi Cita</h2>
  <input type="text" id="folio" placeholder="Folio" required>
  <button onclick="verCita()">Ver Estatus</button>
  <pre id="cita"></pre>

<script>
const token = localStorage.getItem('token');

async function verCita() {
  const res = await fetch(`http://localhost:3000/api/citas/${folio.value}`, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  document.getElementById('cita').textContent = JSON.stringify(await res.json(), null, 2);
}
</script>
</body>
</html>
