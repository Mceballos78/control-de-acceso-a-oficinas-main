<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro — Nexus Guard</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="login-page">

  <div class="login-card">

    <a href="login.html" style="display:inline-flex; align-items:center; gap:6px;
      color:#888; font-size:0.85rem; text-decoration:none; margin-bottom:20px">
      ← Regresar al Login
    </a>

    <div style="text-align:center; margin-bottom:16px">
      <img src="assets/logo.svg" alt="Nexus Guard" style="width:180px"/>
    </div>

    <h2 style="text-align:center; margin-bottom:8px">Crear Cuenta</h2>

    <p style="background:#fff3cd; color:#856404; padding:10px 14px;
      border-radius:8px; font-size:0.82rem; margin-bottom:20px;
      border-left:4px solid #ffc107">
      ⚠️ Solo los empleados autorizados pueden crear una cuenta
    </p>

    <div class="form-group" style="margin-bottom:14px">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej. Juan García"/>
    </div>

    <div class="form-group" style="margin-bottom:14px">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="usuario@nexusguard.com"/>
    </div>

    <div class="form-group" style="margin-bottom:14px">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres"/>
    </div>

    <div class="form-group" style="margin-bottom:14px">
      <label>Confirmar contraseña</label>
      <input type="password" id="password2" placeholder="Repite tu contraseña"/>
    </div>

    <p id="error-msg" style="color:#E74C3C; font-size:0.82rem;
      margin-bottom:10px; display:none"></p>
    <p id="ok-msg" style="color:#27AE60; font-size:0.82rem;
      margin-bottom:10px; display:none">
      ✅ Cuenta creada. Redirigiendo...
    </p>

    <button class="login-btn" id="btn-registro">Crear Cuenta</button>

    <p style="text-align:center; margin-top:16px; font-size:0.85rem; color:#666">
      ¿Ya tienes cuenta? 
      <a href="login.html" style="color:#00C48C; font-weight:700; text-decoration:none">
        Inicia sesión
      </a>
    </p>

  </div>

  <script>
    document.getElementById('btn-registro').addEventListener('click', async () => {
      const nombre    = document.getElementById('nombre').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value.trim();
      const password2 = document.getElementById('password2').value.trim();
      const errorMsg  = document.getElementById('error-msg');
      const okMsg     = document.getElementById('ok-msg');

      errorMsg.style.display = 'none';
      okMsg.style.display    = 'none';

      if (!nombre || !email || !password || !password2) {
        errorMsg.textContent   = 'Por favor llena todos los campos';
        errorMsg.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent   = 'La contraseña debe tener al menos 6 caracteres';
        errorMsg.style.display = 'block';
        return;
      }
      if (password !== password2) {
        errorMsg.textContent   = 'Las contraseñas no coinciden';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res  = await fetch('http://localhost:3000/api/auth/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });
        const data = await res.json();

        if (res.ok) {
          okMsg.style.display = 'block';
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          errorMsg.textContent   = data.mensaje || 'Er
